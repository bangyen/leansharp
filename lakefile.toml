name = "leansharp"
version = "1.0.0"
description = "Formal Verification of Sharpness-Aware Minimization with Z-Score Gradient Filtering"
keywords = ["math", "machine-learning", "optimization", "formal-verification"]
defaultTargets = ["LeanSharp", "Tests"]
lintDriver = "batteries/runLinter"
testDriver = "Tests"

[leanOptions]
pp.unicode.fun = true                 # pretty-prints `fun a ↦ b`
relaxedAutoImplicit = false
weak.linter.mathlibStandardSet = true
maxSynthPendingDepth = 5
maxHeartbeats = 400000

[[require]]
name = "mathlib"
scope = "leanprover-community"
rev = "v4.28.0"

[[lean_lib]]
name = "LeanSharp"

[[lean_lib]]
name = "Tests"
globs = ["Tests.+"]
