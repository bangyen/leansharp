name: Lean Action CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read 
  pages: write 
  id-token: write 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Build Lean project
        uses: leanprover/lean-action@v1

      - name: Guard against missing imports
        run: |
          chmod +x scripts/check_import.sh
          ./scripts/check_import.sh

      - name: Guard against unsqueezed simp tactics
        run: |
          chmod +x scripts/check_simp.sh
          ./scripts/check_simp.sh

      - name: Guard banned keywords
        run: |
          chmod +x scripts/check_banned.sh
          ./scripts/check_banned.sh

      - name: Guard copyright header blocks
        run: |
          chmod +x scripts/check_copyright.sh
          ./scripts/check_copyright.sh

      - name: Guard module description blocks
        run: |
          chmod +x scripts/check_description.sh
          ./scripts/check_description.sh

      - name: Guard against oversized Lean files
        run: |
          chmod +x scripts/check_long_file.sh
          ./scripts/check_long_file.sh

      - name: Guard Lean formatting (dry-run)
        run: |
          chmod +x scripts/format_lean.sh
          ./scripts/format_lean.sh --check