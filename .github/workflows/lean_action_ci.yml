name: Lean Action CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read 
  pages: write 
  id-token: write 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Build Lean project
        uses: leanprover/lean-action@v1

      - name: Guard against new axiom declarations
        run: |
          chmod +x scripts/check_axiom.sh
          ./scripts/check_axiom.sh

      - name: Guard against missing imports
        run: |
          chmod +x scripts/check_import.sh
          ./scripts/check_import.sh

      - name: Guard against unsqueezed simp tactics
        run: |
          chmod +x scripts/check_simp.sh
          ./scripts/check_simp.sh

      - name: Guard against 'sorry' markers
        run: |
          chmod +x scripts/check_sorry.sh
          ./scripts/check_sorry.sh

      - name: Guard against `set_option` directives
        run: |
          chmod +x scripts/check_set_option.sh
          ./scripts/check_set_option.sh

      - name: Guard copyright header blocks
        run: |
          chmod +x scripts/check_copyright.sh
          ./scripts/check_copyright.sh

      - name: Guard module description blocks
        run: |
          chmod +x scripts/check_description.sh
          ./scripts/check_description.sh