name: Lean Action CI

on:
  push:
  pull_request:
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read # Read access to repository contents
  pages: write # Write access to GitHub Pages
  id-token: write # Write access to ID tokens

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Cache .lake directory
        uses: actions/cache@v4
        with:
          path: .lake
          key: ${{ runner.os }}-lean-${{ hashFiles('lake-manifest.json') }}
          restore-keys: |
            ${{ runner.os }}-lean-

      - name: Build Lean project
        uses: leanprover/lean-action@v1

      - name: Guard against new axiom declarations
        run: |
          if grep -rn "^axiom " LeanSharp/; then
            echo "ERROR: Unverified 'axiom' declarations found in LeanSharp source."
            echo "All theorems must be formally proved. Replace axioms with theorems."
            exit 1
          fi
          echo "✓ No axiom declarations found. All theorems formally proved."
